<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="月曆清單">
<title>月曆清單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f8;
  --card: #ffffff;
  --border: #e4e4ec;
  --accent: #7c6dfa;
  --accent2: #fa6d9a;
  --green: #22c97a;
  --text: #1a1a2e;
  --muted: #9494ab;
  --light: #eeeef8;
}
body {
  background: var(--bg); color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100dvh; padding-bottom: 40px;
}
body::before { display: none; }

/* ── TABS ── */
.tabs {
  display: flex; position: sticky; top: 0; z-index: 50;
  background: rgba(245,245,248,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: 0 16px;
}
.tab {
  flex: 1; padding: 14px 0; font-size: 13px; font-weight: 700;
  color: var(--muted); border: none; background: none;
  font-family: inherit; cursor: pointer; letter-spacing: 0.5px;
  border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── PAGES ── */
.page { display: none; padding: 20px 16px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }

/* ── MONTH HEADER ── */
.month-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.month-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
.month-nav { display: flex; gap: 8px; }
.mnav {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  color: var(--muted); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.mnav:active { background: var(--border); }

/* ── CALENDAR GRID ── */
.weekday-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  margin-bottom: 4px;
}
.weekday-cell {
  text-align: center; font-size: 10px; letter-spacing: 1px;
  color: var(--muted); padding: 4px 0; text-transform: uppercase;
}
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-day {
  min-height: 90px; border-radius: 12px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: flex-start;
  justify-content: flex-start; padding: 8px 6px 6px;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
  position: relative; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.cal-day:active { background: var(--light); }
.cal-day.today { border-color: var(--accent); background: rgba(124,109,250,0.04); }
.cal-day.other-month { opacity: 0.25; pointer-events: none; }
.cal-day.selected { background: var(--light); border-color: var(--accent2); }
.cal-day.all-done { border-color: rgba(34,201,122,0.5); background: rgba(34,201,122,0.04); }
.day-num {
  font-size: 12px; font-weight: 800; line-height: 1;
  color: var(--text); position: absolute; top: 6px; right: 7px;
}
.cal-day.today .day-num {
  background: var(--accent); color: #fff;
  border-radius: 50%; width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; top: 5px; right: 5px;
}
.cal-task-list { width: 100%; margin-top: 4px; }
.cal-task-chip {
  font-size: 10px; line-height: 1.35; font-weight: 600;
  padding: 3px 5px; border-radius: 5px; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%; display: block;
}
.cal-task-chip.pending {
  background: rgba(124,109,250,0.12); color: #5c4fe0;
}
.cal-task-chip.done {
  background: rgba(34,201,122,0.1); color: var(--muted);
  text-decoration: line-through;
}
.cal-more {
  font-size: 10px; color: var(--muted); padding: 1px 3px;
}

/* ── DAY PANEL ── */
.day-panel {
  margin-top: 16px; background: var(--card);
  border: 1px solid var(--border); border-radius: 18px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.day-panel-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.day-panel-title { font-size: 15px; font-weight: 900; }
.day-panel-pct { font-size: 12px; color: var(--muted); }
.day-task-list { padding: 8px 12px 12px; }
.day-task {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 6px; border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.day-task:last-child { border-bottom: none; }
.day-task.done .day-task-text { text-decoration: line-through; color: var(--muted); }
.day-checkbox {
  width: 20px; height: 20px; border-radius: 6px;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s; font-size: 11px;
}
.day-task.done .day-checkbox {
  background: linear-gradient(135deg, var(--accent), var(--green));
  border-color: transparent; color: #fff;
}
.day-task-text { font-size: 14px; flex: 1; }
.day-task-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 4px;
  background: rgba(124,109,250,0.15); color: var(--accent);
}
.no-tasks { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }

/* ── MANAGE PAGE ── */
.manage-section { margin-bottom: 24px; }
.manage-title {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.manage-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Add form */
.add-form {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 16px; margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.form-row { margin-bottom: 12px; }
.form-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px; font-size: 14px;
  font-family: inherit; color: var(--text); outline: none;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.form-input:focus, .form-select:focus { border-color: rgba(124,109,250,0.5); }
.form-input::placeholder { color: var(--muted); }

.type-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.type-btn {
  padding: 7px 12px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--muted); font-size: 12px; font-family: inherit;
  cursor: pointer; transition: all 0.15s;
}
.type-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,109,250,0.1); }

.extra-field { margin-top: 10px; display: none; }
.extra-field.show { display: block; }

.weekday-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.wd-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--muted); font-size: 13px; font-family: inherit;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.wd-btn.active { background: rgba(124,109,250,0.15); border-color: var(--accent); color: var(--accent); }

.date-picker-row { display: flex; gap: 8px; }
.form-input-sm { flex: 1; }

.submit-btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 12px; color: #fff;
  font-size: 14px; font-weight: 900; font-family: inherit;
  cursor: pointer; margin-top: 4px;
  transition: opacity 0.2s, transform 0.15s;
}
.submit-btn:active { opacity: 0.85; transform: scale(0.98); }

/* Task list in manage */
.task-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
}
.task-item-icon { font-size: 16px; flex-shrink: 0; }
.task-item-body { flex: 1; min-width: 0; }
.task-item-text { font-size: 14px; font-weight: 600; }
.task-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.task-del-btn {
  width: 30px; height: 30px; border-radius: 8px;
  background: rgba(250,109,154,0.1); border: none;
  color: var(--accent2); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Toast */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(18,18,24,0.95); border: 1px solid var(--border);
  border-radius: 12px; padding: 11px 18px;
  font-size: 13px; color: var(--text); white-space: nowrap;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 200; backdrop-filter: blur(10px);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar')">📅 月曆</button>
  <button class="tab" onclick="switchTab('manage')">📋 管理清單</button>
</div>

<!-- 月曆 -->
<div class="page active" id="page-calendar">
  <div class="month-header">
    <div class="month-title" id="monthTitle">—</div>
    <div class="month-nav">
      <button class="mnav" onclick="changeMonth(-1)">‹</button>
      <button class="today-btn" onclick="goThisMonth()" style="padding:6px 12px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;letter-spacing:1px;">今天</button>
      <button class="mnav" onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="weekday-row">
    <div class="weekday-cell">日</div><div class="weekday-cell">一</div>
    <div class="weekday-cell">二</div><div class="weekday-cell">三</div>
    <div class="weekday-cell">四</div><div class="weekday-cell">五</div>
    <div class="weekday-cell">六</div>
  </div>
  <div class="cal-grid" id="calGrid" style="grid-template-columns:repeat(7,1fr);"></div>
  <div class="day-panel" id="dayPanel" style="display:none">
    <div class="day-panel-header">
      <div class="day-panel-title" id="dayPanelTitle">—</div>
      <div class="day-panel-pct" id="dayPanelPct">—</div>
    </div>
    <div class="day-task-list" id="dayTaskList"></div>
  </div>
</div>

<!-- 管理清單 -->
<div class="page" id="page-manage">

  <div class="add-form">
    <div class="form-row">
      <label class="form-label">待辦事項</label>
      <input class="form-input" id="taskName" placeholder="輸入待辦名稱..." onkeydown="if(event.key==='Enter') submitTask()">
    </div>
    <div class="form-row">
      <label class="form-label">類型</label>
      <div class="type-selector">
        <button class="type-btn active" data-type="daily" onclick="selectType('daily')">📌 每天</button>
        <button class="type-btn" data-type="weekly" onclick="selectType('weekly')">📆 每週</button>
        <button class="type-btn" data-type="specific" onclick="selectType('specific')">🗓 指定幾天</button>
        <button class="type-btn" data-type="once" onclick="selectType('once')">1️⃣ 一次性</button>
      </div>
    </div>

    <!-- 每週：選星期 -->
    <div class="extra-field" id="field-weekly">
      <label class="form-label">選擇星期</label>
      <div class="weekday-picker">
        <button class="wd-btn" data-wd="0" onclick="toggleWd(this)">日</button>
        <button class="wd-btn" data-wd="1" onclick="toggleWd(this)">一</button>
        <button class="wd-btn" data-wd="2" onclick="toggleWd(this)">二</button>
        <button class="wd-btn" data-wd="3" onclick="toggleWd(this)">三</button>
        <button class="wd-btn" data-wd="4" onclick="toggleWd(this)">四</button>
        <button class="wd-btn" data-wd="5" onclick="toggleWd(this)">五</button>
        <button class="wd-btn" data-wd="6" onclick="toggleWd(this)">六</button>
      </div>
    </div>

    <!-- 指定幾天：選月份中的日期 -->
    <div class="extra-field" id="field-specific">
      <label class="form-label">每月幾號出現（可多選）</label>
      <div class="weekday-picker" id="monthDayPicker"></div>
    </div>

    <!-- 一次性：選特定日期 -->
    <div class="extra-field" id="field-once">
      <label class="form-label">指定日期</label>
      <input class="form-input" type="date" id="onceDate">
    </div>

    <button class="submit-btn" onclick="submitTask()">＋ 新增待辦</button>
  </div>

  <!-- 清單列表 -->
  <div class="manage-section">
    <div class="manage-title">📌 每天固定</div>
    <div id="list-daily"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
  <div class="manage-section">
    <div class="manage-title">📆 每週固定</div>
    <div id="list-weekly"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
  <div class="manage-section">
    <div class="manage-title">🗓 指定幾天</div>
    <div id="list-specific"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
  <div class="manage-section">
    <div class="manage-title">1️⃣ 一次性</div>
    <div id="list-once"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WD = ['日','一','二','三','四','五','六'];

// ── State ──
let calWeekStart, selectedKey = null;
let selectedType = 'daily';
let selectedWds = [];
let selectedMDs = [];

function todayKey() { return dkey(new Date()); }
function dkey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseKey(k) {
  const [y,m,d] = k.split('-').map(Number);
  return new Date(y,m-1,d);
}

// ── Storage ──
function loadData() {
  try {
    return {
      tasks: JSON.parse(localStorage.getItem('mc_tasks') || '[]'),
      checks: JSON.parse(localStorage.getItem('mc_checks') || '{}'),
    };
  } catch(e) { return { tasks:[], checks:{} }; }
}
function saveData(d) {
  localStorage.setItem('mc_tasks', JSON.stringify(d.tasks));
  localStorage.setItem('mc_checks', JSON.stringify(d.checks));
}
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

// ── Task matching ──
function getTasksForDate(dateKey, tasks) {
  const d = parseKey(dateKey);
  return tasks.filter(t => {
    if (t.type === 'daily') return true;
    if (t.type === 'weekly') return t.weekdays && t.weekdays.includes(d.getDay());
    if (t.type === 'specific') return t.monthDays && t.monthDays.includes(d.getDate());
    if (t.type === 'once') return t.date === dateKey;
    return false;
  });
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='calendar')||(i===1&&tab==='manage')));
  document.getElementById('page-calendar').classList.toggle('active', tab==='calendar');
  document.getElementById('page-manage').classList.toggle('active', tab==='manage');
  if (tab==='manage') renderManage();
}

// ── Calendar ──
function initCal() {
  const now = new Date();
  now.setHours(0,0,0,0);
  // weekStart = 本週日（或本週第一天）
  calWeekStart = new Date(now);
  calWeekStart.setDate(now.getDate() - now.getDay()); // 從週日開始
  selectedKey = dkey(now);
  renderCal();
}

function changeMonth(d) {
  // 前進/後退兩週
  calWeekStart = new Date(calWeekStart);
  calWeekStart.setDate(calWeekStart.getDate() + d * 14);
  renderCal();
}
function goThisMonth() {
  const now = new Date();
  now.setHours(0,0,0,0);
  calWeekStart = new Date(now);
  calWeekStart.setDate(now.getDate() - now.getDay());
  selectedKey = dkey(now);
  renderCal();
}

function renderCal() {
  // 計算兩週的起迄
  const start = new Date(calWeekStart);
  const end = new Date(start);
  end.setDate(start.getDate() + 13); // 14 天

  // 標題：顯示兩週的月份範圍
  const sm = start.getMonth()+1, sy = start.getFullYear();
  const em = end.getMonth()+1,   ey = end.getFullYear();
  let title = `${sy} 年 ${sm} 月`;
  if (sm !== em) title += ` – ${em} 月`;
  document.getElementById('monthTitle').textContent = title;

  const data = loadData();
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const todK = todayKey();

  for (let i = 0; i < 14; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const k = dkey(d);
    grid.appendChild(makeDayCell(k, d.getDate(), false, data, todK));
  }

  renderDayPanel(selectedKey, data);
}

function makeDayCell(key, dayNum, otherMonth, data, todK) {
  const tasks = getTasksForDate(key, data.tasks);
  const checks = data.checks[key] || {};
  const total = tasks.length;
  const doneCount = tasks.filter(t => checks[t.id]).length;
  const allDone = total > 0 && doneCount === total;

  const cell = document.createElement('div');
  cell.className = 'cal-day'
    + (otherMonth ? ' other-month' : '')
    + (key === todK ? ' today' : '')
    + (key === selectedKey ? ' selected' : '')
    + (allDone ? ' all-done' : '');

  const numEl = document.createElement('div');
  numEl.className = 'day-num';
  numEl.textContent = dayNum;
  cell.appendChild(numEl);

  if (tasks.length > 0) {
    // 未完成優先排序
    const sorted = [
      ...tasks.filter(t => !checks[t.id]),
      ...tasks.filter(t =>  checks[t.id]),
    ];

    const listEl = document.createElement('div');
    listEl.className = 'cal-task-list';

    const maxShow = 3;
    sorted.slice(0, maxShow).forEach(t => {
      const chip = document.createElement('span');
      chip.className = 'cal-task-chip ' + (checks[t.id] ? 'done' : 'pending');
      chip.textContent = t.name;
      listEl.appendChild(chip);
    });

    if (sorted.length > maxShow) {
      const more = document.createElement('div');
      more.className = 'cal-more';
      more.textContent = `+${sorted.length - maxShow} 項`;
      listEl.appendChild(more);
    }

    cell.appendChild(listEl);
  }

  cell.addEventListener('click', () => {
    selectedKey = key;
    renderCal();
  });
  return cell;
}

function renderDayPanel(key, data) {
  if (!key) { document.getElementById('dayPanel').style.display = 'none'; return; }
  const d = parseKey(key);
  const tasks = getTasksForDate(key, data.tasks);
  const checks = data.checks[key] || {};

  const panel = document.getElementById('dayPanel');
  panel.style.display = '';

  document.getElementById('dayPanelTitle').textContent =
    `${d.getMonth()+1} 月 ${d.getDate()} 日（週${WD[d.getDay()]}）`;

  const total = tasks.length;
  const done  = tasks.filter(t => checks[t.id]).length;
  document.getElementById('dayPanelPct').textContent =
    total === 0 ? '無待辦' : `${done} / ${total} 完成`;

  const list = document.getElementById('dayTaskList');
  list.innerHTML = '';

  if (tasks.length === 0) {
    list.innerHTML = '<div class="no-tasks">這天沒有待辦 ✨</div>';
    return;
  }

  tasks.forEach(task => {
    const isDone = !!checks[task.id];
    const row = document.createElement('div');
    row.className = 'day-task' + (isDone ? ' done' : '');

    const typeLabel = { daily:'每天', weekly:'每週', specific:'指定日', once:'一次' }[task.type] || '';

    row.innerHTML = `
      <div class="day-checkbox">${isDone ? '✓' : ''}</div>
      <div class="day-task-text">${escHtml(task.name)}</div>
      <div class="day-task-badge">${typeLabel}</div>
    `;
    row.addEventListener('click', () => toggleCheck(key, task.id));
    list.appendChild(row);
  });
}

function toggleCheck(key, taskId) {
  const data = loadData();
  if (!data.checks[key]) data.checks[key] = {};
  data.checks[key][taskId] = !data.checks[key][taskId];
  saveData(data);
  renderCal();
}

// ── Manage ──
function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  document.getElementById('field-weekly').classList.toggle('show', type === 'weekly');
  document.getElementById('field-specific').classList.toggle('show', type === 'specific');
  document.getElementById('field-once').classList.toggle('show', type === 'once');
}

function toggleWd(btn) {
  btn.classList.toggle('active');
  const wd = parseInt(btn.dataset.wd);
  if (btn.classList.contains('active')) { if (!selectedWds.includes(wd)) selectedWds.push(wd); }
  else { selectedWds = selectedWds.filter(w => w !== wd); }
}

function buildMonthDayPicker() {
  const picker = document.getElementById('monthDayPicker');
  picker.innerHTML = '';
  for (let d = 1; d <= 31; d++) {
    const btn = document.createElement('button');
    btn.className = 'wd-btn';
    btn.textContent = d;
    btn.style.width = '36px'; btn.style.fontSize = '11px';
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (btn.classList.contains('active')) { if (!selectedMDs.includes(d)) selectedMDs.push(d); }
      else { selectedMDs = selectedMDs.filter(x => x !== d); }
    });
    picker.appendChild(btn);
  }
}

function submitTask() {
  const name = document.getElementById('taskName').value.trim();
  if (!name) { showToast('⚠️ 請輸入待辦名稱'); return; }

  const data = loadData();
  const task = { id: uid(), name, type: selectedType };

  if (selectedType === 'weekly') {
    if (selectedWds.length === 0) { showToast('⚠️ 請選擇星期'); return; }
    task.weekdays = [...selectedWds];
  } else if (selectedType === 'specific') {
    if (selectedMDs.length === 0) { showToast('⚠️ 請選擇日期'); return; }
    task.monthDays = [...selectedMDs];
  } else if (selectedType === 'once') {
    const d = document.getElementById('onceDate').value;
    if (!d) { showToast('⚠️ 請選擇日期'); return; }
    task.date = d;
  }

  data.tasks.push(task);
  saveData(data);
  document.getElementById('taskName').value = '';
  // reset
  selectedWds = []; selectedMDs = [];
  document.querySelectorAll('.wd-btn').forEach(b => b.classList.remove('active'));
  renderManage();
  renderCal();
  showToast('✅ 已新增！');
}

function renderManage() {
  const data = loadData();
  const types = ['daily','weekly','specific','once'];
  const icons = { daily:'📌', weekly:'📆', specific:'🗓', once:'1️⃣' };

  types.forEach(type => {
    const el = document.getElementById('list-' + type);
    const items = data.tasks.filter(t => t.type === type);
    if (items.length === 0) {
      el.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div>';
      return;
    }
    el.innerHTML = '';
    items.forEach(task => {
      const sub = getTaskSub(task);
      const div = document.createElement('div');
      div.className = 'task-item';
      div.innerHTML = `
        <div class="task-item-icon">${icons[type]}</div>
        <div class="task-item-body">
          <div class="task-item-text">${escHtml(task.name)}</div>
          <div class="task-item-sub">${sub}</div>
        </div>
        <button class="task-del-btn" onclick="deleteTask('${task.id}')">✕</button>
      `;
      el.appendChild(div);
    });
  });
}

function getTaskSub(task) {
  if (task.type === 'daily') return '每天出現';
  if (task.type === 'weekly') return '每週' + (task.weekdays||[]).map(w => WD[w]).join('、');
  if (task.type === 'specific') return '每月 ' + (task.monthDays||[]).sort((a,b)=>a-b).join('、') + ' 號';
  if (task.type === 'once') return task.date || '—';
  return '';
}

function deleteTask(id) {
  const data = loadData();
  data.tasks = data.tasks.filter(t => t.id !== id);
  saveData(data);
  renderManage();
  renderCal();
  showToast('🗑 已刪除');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init ──
buildMonthDayPicker();
// set today as default for once date
document.getElementById('onceDate').value = todayKey();
initCal();
renderManage();
</script>
</body>
