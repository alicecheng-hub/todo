<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="月曆清單">
<title>月曆清單</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f8; --card: #ffffff; --border: #e4e4ec;
  --accent: #7c6dfa; --accent2: #fa6d9a; --green: #22c97a;
  --text: #1a1a2e; --muted: #9494ab; --light: #eeeef8;
}
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100dvh; padding-bottom: 60px; }
.tabs { display: flex; position: sticky; top: 0; z-index: 50; background: rgba(245,245,248,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 16px; }
.tab { flex: 1; padding: 14px 0; font-size: 13px; font-weight: 700; color: var(--muted); border: none; background: none; font-family: inherit; cursor: pointer; letter-spacing: 0.5px; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.page { display: none; padding: 16px 14px; max-width: 480px; margin: 0 auto; }
.page.active { display: block; }
.month-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.month-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
.month-nav { display: flex; gap: 8px; align-items: center; }
.mnav { width: 34px; height: 34px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--muted); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.today-btn { padding: 6px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--muted); font-size: 11px; font-family: inherit; cursor: pointer; }
.weekday-row { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
.weekday-cell { text-align: center; font-size: 10px; letter-spacing: 1px; color: var(--muted); padding: 4px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-day { min-height: 90px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: flex-start; padding: 8px 6px 6px; cursor: pointer; transition: border-color 0.15s, background 0.15s; position: relative; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.cal-day:active { background: var(--light); }
.cal-day.today { border-color: var(--accent); background: rgba(124,109,250,0.04); }
.cal-day.selected { background: var(--light); border-color: var(--accent2); }
.cal-day.all-done { border-color: rgba(34,201,122,0.5); background: rgba(34,201,122,0.04); }
.day-num { font-size: 12px; font-weight: 800; color: var(--text); position: absolute; top: 6px; right: 7px; }
.cal-day.today .day-num { background: var(--accent); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; top: 5px; right: 5px; }
.cal-task-list { width: 100%; margin-top: 4px; }
.cal-task-chip { font-size: 10px; line-height: 1.35; font-weight: 600; padding: 3px 5px; border-radius: 5px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: block; }
.cal-task-chip.pending { background: rgba(124,109,250,0.12); color: #5c4fe0; }
.cal-task-chip.pending.daily { background: rgba(148,148,171,0.1); color: var(--muted); }
.cal-task-chip.done { background: rgba(34,201,122,0.1); color: var(--muted); text-decoration: line-through; }
.cal-more { font-size: 10px; color: var(--muted); padding: 1px 3px; }
.day-panel { margin-top: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
.day-panel-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.day-panel-title { font-size: 15px; font-weight: 900; }
.day-panel-pct { font-size: 12px; color: var(--muted); }
.quick-add { display: flex; gap: 8px; padding: 10px 12px; border-bottom: 1px solid var(--border); align-items: center; }
.quick-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.2s; }
.quick-input:focus { border-color: rgba(124,109,250,0.5); }
.quick-input::placeholder { color: var(--muted); }
.quick-add-btn { width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.quick-add-btn:active { opacity: 0.85; }
.day-task-list { padding: 4px 12px 12px; }
.day-task { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--border); }
.day-task:last-child { border-bottom: none; }
.day-task.done .day-task-text { text-decoration: line-through; color: var(--muted); }
.day-checkbox { width: 22px; height: 22px; border-radius: 7px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s, border-color 0.2s; font-size: 12px; cursor: pointer; }
.day-task.done .day-checkbox { background: linear-gradient(135deg, var(--accent), var(--green)); border-color: transparent; color: #fff; }
.day-task-text { font-size: 14px; flex: 1; cursor: pointer; }
.day-task-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: rgba(124,109,250,0.1); color: var(--accent); flex-shrink: 0; }
.day-task-badge.daily { background: rgba(148,148,171,0.12); color: var(--muted); }
.day-task-actions { display: flex; gap: 4px; }
.day-task-del { width: 26px; height: 26px; border-radius: 7px; background: rgba(250,109,154,0.08); border: none; color: var(--accent2); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.day-task-edit { width: 26px; height: 26px; border-radius: 7px; background: rgba(124,109,250,0.08); border: none; color: var(--accent); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.no-tasks { padding: 16px; text-align: center; color: var(--muted); font-size: 13px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(4px); }
.modal { background: var(--card); border-radius: 20px; padding: 24px; width: 100%; max-width: 340px; }
.modal-title { font-size: 15px; font-weight: 900; margin-bottom: 14px; }
.modal-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 15px; font-family: inherit; color: var(--text); outline: none; margin-bottom: 14px; }
.modal-input:focus { border-color: rgba(124,109,250,0.5); }
.modal-btns { display: flex; gap: 8px; }
.modal-save { flex: 1; padding: 12px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 900; font-family: inherit; cursor: pointer; }
.modal-cancel { padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-size: 14px; font-family: inherit; cursor: pointer; }
.manage-section { margin-bottom: 24px; }
.manage-title { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.manage-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.add-form { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.form-row { margin-bottom: 12px; }
.form-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; display: block; }
.form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
.form-input:focus { border-color: rgba(124,109,250,0.5); }
.form-input::placeholder { color: var(--muted); }
.type-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.type-btn { padding: 7px 12px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 12px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.type-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,109,250,0.1); }
.extra-field { margin-top: 10px; display: none; }
.extra-field.show { display: block; }
.weekday-picker { display: flex; gap: 6px; flex-wrap: wrap; }
.wd-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
.wd-btn.active { background: rgba(124,109,250,0.15); border-color: var(--accent); color: var(--accent); }
.submit-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 900; font-family: inherit; cursor: pointer; margin-top: 4px; }
.submit-btn:active { opacity: 0.85; }
.task-item { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.task-item-icon { font-size: 16px; flex-shrink: 0; }
.task-item-body { flex: 1; min-width: 0; }
.task-item-text { font-size: 14px; font-weight: 600; }
.task-item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.task-item-actions { display: flex; gap: 6px; }
.task-del-btn { width: 30px; height: 30px; border-radius: 8px; background: rgba(250,109,154,0.1); border: none; color: var(--accent2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.task-edit-btn { width: 30px; height: 30px; border-radius: 8px; background: rgba(124,109,250,0.1); border: none; color: var(--accent); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(26,26,46,0.9); border-radius: 12px; padding: 11px 18px; font-size: 13px; color: #fff; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 200; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
/* 筆記 */
.notes-cat-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.cat-btn { padding: 7px 14px; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.cat-btn.del-cat { background: rgba(250,109,154,0.08); border-color: rgba(250,109,154,0.2); color: var(--accent2); font-size: 11px; padding: 7px 10px; }
.notes-add-cat { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.note-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.note-card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.note-card-body { font-size: 13px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
.note-card-actions { display: flex; gap: 6px; margin-top: 10px; justify-content: flex-end; }
.note-add-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 900; font-family: inherit; cursor: pointer; margin-bottom: 16px; }
.modal-textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 11px 14px; font-size: 14px; font-family: inherit; color: var(--text); outline: none; margin-bottom: 10px; min-height: 100px; resize: none; line-height: 1.6; }
.modal-textarea:focus { border-color: rgba(124,109,250,0.5); }
/* 備份 */
.backup-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; }
.backup-desc { font-size:12px; color:var(--muted); margin-bottom:10px; }
.backup-btn { display:block; width:100%; padding:13px; border-radius:12px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; text-align:center; border:none; }
.export-btn { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; margin-bottom:4px; }
.import-btn { background:var(--bg); border:1px solid var(--border) !important; color:var(--text); margin-top:4px; }
.backup-divider { height:1px; background:var(--border); margin:14px 0; }
/* 筆記新架構 */
.notes-top-bar { display:flex; gap:8px; margin-bottom:14px; align-items:center; }
.notes-top-select { flex:1; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:14px; font-family:inherit; color:var(--text); outline:none; -webkit-appearance:none; }
.notes-new-cat-row { display:flex; gap:8px; margin-bottom:14px; align-items:center; }
.note-group { background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden; }
.note-group-header { display:flex; align-items:center; padding:13px 14px; cursor:pointer; gap:10px; }
.note-group-arrow { font-size:11px; color:var(--muted); transition:transform 0.2s; flex-shrink:0; }
.note-group-arrow.open { transform:rotate(90deg); }
.note-group-title { font-size:15px; font-weight:700; flex:1; }
.note-group-count { font-size:11px; color:var(--muted); }
.note-group-actions { display:flex; gap:4px; }
.note-group-body { border-top:1px solid var(--border); }
.note-item { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; }
.note-item:last-child { border-bottom:none; }
.note-item-body { flex:1; min-width:0; }
.note-item-title { font-size:14px; font-weight:600; }
.note-item-preview { font-size:12px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.note-item-expanded { background:var(--bg); padding:12px 14px; font-size:13px; color:var(--text); line-height:1.7; white-space:pre-wrap; word-break:break-all; border-bottom:1px solid var(--border); }
.note-item-actions { display:flex; gap:4px; flex-shrink:0; }
.note-add-item-btn { width:100%; padding:11px; background:none; border:none; border-top:1px solid var(--border); color:var(--accent); font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; }
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" onclick="switchTab('calendar')">📅 月曆</button>
  <button class="tab" onclick="switchTab('manage')">📋 管理</button>
  <button class="tab" onclick="switchTab('inbox')">📝 待排程</button>
  <button class="tab" onclick="switchTab('notes')">📒 筆記</button>
</div>
<div class="page active" id="page-calendar">
  <div class="month-header">
    <div class="month-title" id="monthTitle">—</div>
    <div class="month-nav">
      <button class="mnav" onclick="changeWeek(-1)">‹</button>
      <button class="today-btn" onclick="goToday()">今天</button>
      <button class="mnav" onclick="changeWeek(1)">›</button>
    </div>
  </div>
  <div class="weekday-row">
    <div class="weekday-cell">日</div><div class="weekday-cell">一</div>
    <div class="weekday-cell">二</div><div class="weekday-cell">三</div>
    <div class="weekday-cell">四</div><div class="weekday-cell">五</div>
    <div class="weekday-cell">六</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="day-panel" id="dayPanel" style="display:none">
    <div class="day-panel-header">
      <div class="day-panel-title" id="dayPanelTitle">—</div>
      <div class="day-panel-pct" id="dayPanelPct">—</div>
    </div>
    <div class="quick-add">
      <input class="quick-input" id="quickInput" placeholder="輸入待辦，按 ＋ 新增..." onkeydown="if(event.key==='Enter') quickAdd()">
      <button class="quick-add-btn" onclick="quickAdd()">＋</button>
    </div>
    <div class="day-task-list" id="dayTaskList"></div>
  </div>
</div>
<div class="page" id="page-manage">
  <div class="add-form">
    <div class="form-row">
      <label class="form-label">待辦事項</label>
      <input class="form-input" id="taskName" placeholder="輸入待辦名稱..." onkeydown="if(event.key==='Enter') submitTask()">
    </div>
    <div class="form-row">
      <label class="form-label">類型</label>
      <div class="type-selector">
        <button class="type-btn active" data-type="daily" onclick="selectType('daily')">📌 每天</button>
        <button class="type-btn" data-type="weekly" onclick="selectType('weekly')">📆 每週</button>
        <button class="type-btn" data-type="specific" onclick="selectType('specific')">🗓 指定幾天</button>
        <button class="type-btn" data-type="once" onclick="selectType('once')">1️⃣ 一次性</button>
      </div>
    </div>
    <div class="extra-field" id="field-weekly">
      <label class="form-label">選擇星期</label>
      <div class="weekday-picker">
        <button class="wd-btn" data-wd="0" onclick="toggleWd(this)">日</button>
        <button class="wd-btn" data-wd="1" onclick="toggleWd(this)">一</button>
        <button class="wd-btn" data-wd="2" onclick="toggleWd(this)">二</button>
        <button class="wd-btn" data-wd="3" onclick="toggleWd(this)">三</button>
        <button class="wd-btn" data-wd="4" onclick="toggleWd(this)">四</button>
        <button class="wd-btn" data-wd="5" onclick="toggleWd(this)">五</button>
        <button class="wd-btn" data-wd="6" onclick="toggleWd(this)">六</button>
      </div>
    </div>
    <div class="extra-field" id="field-specific">
      <label class="form-label">每月幾號出現（可多選）</label>
      <div class="weekday-picker" id="monthDayPicker"></div>
    </div>
    <div class="extra-field" id="field-once">
      <label class="form-label">指定日期</label>
      <input class="form-input" type="date" id="onceDate">
    </div>
    <button class="submit-btn" onclick="submitTask()">＋ 新增待辦</button>
  </div>
  <div class="manage-section">
    <div class="manage-title">📌 每天固定</div>
    <div id="list-daily"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
  <div class="manage-section">
    <div class="manage-title">📆 每週固定</div>
    <div id="list-weekly"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
  <div class="manage-section">
    <div class="manage-title">🗓 指定幾天</div>
    <div id="list-specific"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
  <div class="manage-section">
    <div class="manage-title">1️⃣ 一次性</div>
    <div id="list-once"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
  <div class="manage-section">
    <div class="manage-title">💾 備份與還原</div>
    <div class="backup-box">
      <p class="backup-desc">定期匯出備份，避免資料不見</p>
      <button class="backup-btn export-btn" onclick="exportBackup()">📤 匯出備份</button>
      <div class="backup-divider"></div>
      <p class="backup-desc">選擇備份檔案還原</p>
      <label class="backup-btn import-btn">📥 匯入備份<input type="file" accept=".json" style="display:none" onchange="importBackup(this)"></label>
    </div>
  </div>
</div>

<!-- 待排程 -->
<div class="page" id="page-inbox">
  <div class="add-form">
    <div class="form-row">
      <label class="form-label">想做的事</label>
      <input class="form-input" id="inboxName" placeholder="輸入待辦名稱..." onkeydown="if(event.key==='Enter') addInbox()">
    </div>
    <div class="form-row">
      <label class="form-label">備註（選填）</label>
      <input class="form-input" id="inboxNote" placeholder="備註說明...">
    </div>
    <button class="submit-btn" onclick="addInbox()">＋ 加入待排程</button>
  </div>
  <div class="manage-section">
    <div class="manage-title">📝 尚未排入日期</div>
    <div id="list-inbox"><div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div></div>
  </div>
</div>
<!-- 筆記 -->
<div class="page" id="page-notes">
  <div id="notesView"></div>
</div>

<div class="toast" id="toast"></div>
<script>
const WD=['日','一','二','三','四','五','六'];
let calWeekStart,selectedKey=null,selectedType='daily',selectedWds=[],selectedMDs=[];
const typeOrder={once:0,weekly:1,specific:2,daily:3};

function todayKey(){return dkey(new Date());}
function dkey(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parseKey(k){const[y,m,d]=k.split('-').map(Number);return new Date(y,m-1,d);}
function loadData(){try{return{tasks:JSON.parse(localStorage.getItem('mc_tasks')||'[]'),checks:JSON.parse(localStorage.getItem('mc_checks')||'{}'),inbox:JSON.parse(localStorage.getItem('mc_inbox')||'[]'),notes:JSON.parse(localStorage.getItem('mc_notes')||'[]'),noteCats:JSON.parse(localStorage.getItem('mc_noteCats')||'[]')};}catch(e){return{tasks:[],checks:{},inbox:[],notes:[],noteCats:[]};}}
function saveData(d){localStorage.setItem('mc_tasks',JSON.stringify(d.tasks));localStorage.setItem('mc_checks',JSON.stringify(d.checks));localStorage.setItem('mc_inbox',JSON.stringify(d.inbox||[]));localStorage.setItem('mc_notes',JSON.stringify(d.notes||[]));localStorage.setItem('mc_noteCats',JSON.stringify(d.noteCats||[]));} 
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getTasksForDate(dateKey,tasks){
  const d=parseKey(dateKey);
  return tasks.filter(t=>{
    if(t.type==='daily')return true;
    if(t.type==='weekly')return t.weekdays&&t.weekdays.includes(d.getDay());
    if(t.type==='specific')return t.monthDays&&t.monthDays.includes(d.getDate());
    if(t.type==='once')return t.date===dateKey;
    return false;
  }).sort((a,b)=>(typeOrder[a.type]||0)-(typeOrder[b.type]||0));
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='calendar')||(i===1&&tab==='manage')||(i===2&&tab==='inbox')||(i===3&&tab==='notes')));
  document.getElementById('page-calendar').classList.toggle('active',tab==='calendar');
  document.getElementById('page-manage').classList.toggle('active',tab==='manage');
  document.getElementById('page-inbox').classList.toggle('active',tab==='inbox');
  document.getElementById('page-notes').classList.toggle('active',tab==='notes');
  if(tab==='manage')renderManage();
  if(tab==='inbox')renderInbox();
  if(tab==='notes')renderNotes();
}

function initCal(){
  const now=new Date();now.setHours(0,0,0,0);
  calWeekStart=new Date(now);calWeekStart.setDate(now.getDate()-now.getDay());
  selectedKey=dkey(now);renderCal();
}
function changeWeek(d){calWeekStart=new Date(calWeekStart);calWeekStart.setDate(calWeekStart.getDate()+d*7);renderCal();}
function goToday(){
  const now=new Date();now.setHours(0,0,0,0);
  calWeekStart=new Date(now);calWeekStart.setDate(now.getDate()-now.getDay());
  selectedKey=dkey(now);renderCal();
}

function renderCal(){
  const start=new Date(calWeekStart),end=new Date(start);end.setDate(start.getDate()+13);
  const sm=start.getMonth()+1,sy=start.getFullYear(),em=end.getMonth()+1;
  let title=`${sy} 年 ${sm} 月`;if(sm!==em)title+=` – ${em} 月`;
  document.getElementById('monthTitle').textContent=title;
  const data=loadData(),grid=document.getElementById('calGrid'),todK=todayKey();
  grid.innerHTML='';
  for(let i=0;i<14;i++){const d=new Date(start);d.setDate(start.getDate()+i);grid.appendChild(makeDayCell(dkey(d),d.getDate(),data,todK));}
  renderDayPanel(selectedKey,data);
}

function makeDayCell(key,dayNum,data,todK){
  const tasks=getTasksForDate(key,data.tasks),checks=data.checks[key]||{};
  const total=tasks.length,doneCount=tasks.filter(t=>checks[t.id]).length,allDone=total>0&&doneCount===total;
  const cell=document.createElement('div');
  cell.className='cal-day'+(key===todK?' today':'')+(key===selectedKey?' selected':'')+(allDone?' all-done':'');
  const numEl=document.createElement('div');numEl.className='day-num';numEl.textContent=dayNum;cell.appendChild(numEl);
  if(tasks.length>0){
    const pending=tasks.filter(t=>!checks[t.id]),done=tasks.filter(t=>checks[t.id]),sorted=[...pending,...done];
    const listEl=document.createElement('div');listEl.className='cal-task-list';
    sorted.slice(0,4).forEach(t=>{
      const chip=document.createElement('span'),isDone=!!checks[t.id];
      chip.className='cal-task-chip '+(isDone?'done':'pending')+(t.type==='daily'?' daily':'');
      chip.textContent=t.name;listEl.appendChild(chip);
    });
    if(sorted.length>4){const more=document.createElement('div');more.className='cal-more';more.textContent=`+${sorted.length-4} 項`;listEl.appendChild(more);}
    cell.appendChild(listEl);
  }
  cell.addEventListener('click',()=>{selectedKey=key;renderCal();setTimeout(()=>document.getElementById('quickInput').focus(),150);});
  return cell;
}

function renderDayPanel(key,data){
  if(!key){document.getElementById('dayPanel').style.display='none';return;}
  const d=parseKey(key),tasks=getTasksForDate(key,data.tasks),checks=data.checks[key]||{};
  document.getElementById('dayPanel').style.display='';
  document.getElementById('dayPanelTitle').textContent=`${d.getMonth()+1} 月 ${d.getDate()} 日（週${WD[d.getDay()]}）`;
  const total=tasks.length,done=tasks.filter(t=>checks[t.id]).length;
  document.getElementById('dayPanelPct').textContent=total===0?'無待辦':`${done} / ${total} 完成`;
  const list=document.getElementById('dayTaskList');list.innerHTML='';
  if(tasks.length===0){list.innerHTML='<div class="no-tasks">這天沒有待辦，在上方輸入新增 ✨</div>';return;}
  const pending=tasks.filter(t=>!checks[t.id]),doneArr=tasks.filter(t=>checks[t.id]),sorted=[...pending,...doneArr];
  sorted.forEach(task=>{
    const isDone=!!checks[task.id],isDaily=task.type==='daily';
    const typeLabel={daily:'每天',weekly:'每週',specific:'指定日',once:'一次'}[task.type]||'';
    const row=document.createElement('div');row.className='day-task'+(isDone?' done':'');
    row.innerHTML=`<div class="day-checkbox">${isDone?'✓':''}</div><div class="day-task-text">${escHtml(task.name)}</div><div class="day-task-badge${isDaily?' daily':''}">${typeLabel}</div><div class="day-task-actions"><button class="day-task-edit" title="編輯">✎</button><button class="day-task-del" title="刪除">✕</button></div>`;
    row.querySelector('.day-checkbox').addEventListener('click',e=>{e.stopPropagation();toggleCheck(key,task.id);});
    row.querySelector('.day-task-text').addEventListener('click',()=>toggleCheck(key,task.id));
    row.querySelector('.day-task-edit').addEventListener('click',e=>{e.stopPropagation();openEditModal(task.id);});
    row.querySelector('.day-task-del').addEventListener('click',e=>{e.stopPropagation();deleteTaskById(task.id);});
    list.appendChild(row);
  });
}

function quickAdd(){
  const input=document.getElementById('quickInput'),name=input.value.trim();
  if(!name||!selectedKey){showToast('⚠️ 請先點選日期並輸入待辦');return;}
  const data=loadData();data.tasks.push({id:uid(),name,type:'once',date:selectedKey});
  saveData(data);input.value='';renderCal();showToast('✅ 已新增！');
}
function toggleCheck(key,taskId){
  const data=loadData();if(!data.checks[key])data.checks[key]={};
  data.checks[key][taskId]=!data.checks[key][taskId];saveData(data);renderCal();
}
function deleteTaskById(id){
  const data=loadData();data.tasks=data.tasks.filter(t=>t.id!==id);saveData(data);renderCal();showToast('🗑 已刪除');
}

function openEditModal(taskId){
  const data=loadData(),task=data.tasks.find(t=>t.id===taskId);if(!task)return;
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><div class="modal-title">✎ 修改待辦</div><input class="modal-input" id="editInput" value="${escHtml(task.name)}" onkeydown="if(event.key==='Enter')saveEdit('${taskId}')"><div class="modal-btns"><button class="modal-save" onclick="saveEdit('${taskId}')">儲存</button><button class="modal-cancel" onclick="closeModal()">取消</button></div></div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('editInput').focus(),100);
}
function saveEdit(taskId){
  const input=document.getElementById('editInput');if(!input)return;
  const name=input.value.trim();if(!name){showToast('⚠️ 名稱不能為空');return;}
  const data=loadData(),task=data.tasks.find(t=>t.id===taskId);
  if(task)task.name=name;
  saveData(data);closeModal();renderCal();renderManage();showToast('✅ 已更新！');
}
function closeModal(){const o=document.querySelector('.modal-overlay');if(o)o.remove();}

function selectType(type){
  selectedType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===type));
  document.getElementById('field-weekly').classList.toggle('show',type==='weekly');
  document.getElementById('field-specific').classList.toggle('show',type==='specific');
  document.getElementById('field-once').classList.toggle('show',type==='once');
}
function toggleWd(btn){
  btn.classList.toggle('active');const wd=parseInt(btn.dataset.wd);
  if(btn.classList.contains('active')){if(!selectedWds.includes(wd))selectedWds.push(wd);}
  else{selectedWds=selectedWds.filter(w=>w!==wd);}
}
function buildMonthDayPicker(){
  const picker=document.getElementById('monthDayPicker');
  for(let d=1;d<=31;d++){const btn=document.createElement('button');btn.className='wd-btn';btn.textContent=d;btn.style.fontSize='11px';btn.addEventListener('click',()=>{btn.classList.toggle('active');if(btn.classList.contains('active')){if(!selectedMDs.includes(d))selectedMDs.push(d);}else{selectedMDs=selectedMDs.filter(x=>x!==d);}});picker.appendChild(btn);}
}
function submitTask(){
  const name=document.getElementById('taskName').value.trim();
  if(!name){showToast('⚠️ 請輸入待辦名稱');return;}
  const data=loadData(),task={id:uid(),name,type:selectedType};
  if(selectedType==='weekly'){if(selectedWds.length===0){showToast('⚠️ 請選擇星期');return;}task.weekdays=[...selectedWds];}
  else if(selectedType==='specific'){if(selectedMDs.length===0){showToast('⚠️ 請選擇日期');return;}task.monthDays=[...selectedMDs];}
  else if(selectedType==='once'){const d=document.getElementById('onceDate').value;if(!d){showToast('⚠️ 請選擇日期');return;}task.date=d;}
  data.tasks.push(task);saveData(data);
  document.getElementById('taskName').value='';selectedWds=[];selectedMDs=[];
  document.querySelectorAll('.wd-btn').forEach(b=>b.classList.remove('active'));
  renderManage();renderCal();showToast('✅ 已新增！');
}
function renderManage(){
  const data=loadData(),types=['daily','weekly','specific','once'],icons={daily:'📌',weekly:'📆',specific:'🗓',once:'1️⃣'};
  types.forEach(type=>{
    const el=document.getElementById('list-'+type),items=data.tasks.filter(t=>t.type===type);
    if(items.length===0){el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0">尚無項目</div>';return;}
    el.innerHTML='';
    items.forEach(task=>{
      const div=document.createElement('div');div.className='task-item';
      div.innerHTML=`<div class="task-item-icon">${icons[type]}</div><div class="task-item-body"><div class="task-item-text">${escHtml(task.name)}</div><div class="task-item-sub">${getTaskSub(task)}</div></div><div class="task-item-actions"><button class="task-edit-btn" onclick="openEditModal('${task.id}')">✎</button><button class="task-del-btn" onclick="deleteTask('${task.id}')">✕</button></div>`;
      el.appendChild(div);
    });
  });
}
function getTaskSub(task){
  if(task.type==='daily')return '每天出現';
  if(task.type==='weekly')return '每週'+(task.weekdays||[]).map(w=>WD[w]).join('、');
  if(task.type==='specific')return '每月 '+(task.monthDays||[]).sort((a,b)=>a-b).join('、')+' 號';
  if(task.type==='once')return task.date||'—';
  return '';
}
function deleteTask(id){
  const data=loadData();data.tasks=data.tasks.filter(t=>t.id!==id);
  saveData(data);renderManage();renderCal();showToast('🗑 已刪除');
}
function exportBackup(){
  const data=loadData();
  const json=JSON.stringify({tasks:data.tasks,checks:data.checks,inbox:data.inbox||[],notes:data.notes||[],noteCats:data.noteCats||[]},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date();
  const dateStr=date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
  a.href=url; a.download='月曆清單備份_'+dateStr+'.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✅ 備份已匯出！');
}
function importBackup(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.tasks)throw new Error('格式錯誤');
      if(!confirm('匯入後會覆蓋現有資料，確定嗎？'))return;
      localStorage.setItem('mc_tasks',JSON.stringify(data.tasks||[]));
      localStorage.setItem('mc_checks',JSON.stringify(data.checks||{}));
      localStorage.setItem('mc_inbox',JSON.stringify(data.inbox||[]));
      localStorage.setItem('mc_notes',JSON.stringify(data.notes||[]));
      localStorage.setItem('mc_noteCats',JSON.stringify(data.noteCats||[]));
      showToast('✅ 備份已還原！');
      renderCal(); renderManage();
    }catch(err){showToast('⚠️ 檔案格式錯誤');}
  };
  reader.readAsText(file);
  input.value='';
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// ── Inbox 待排程 ──
function addInbox(){
  const name=document.getElementById('inboxName').value.trim();
  const note=document.getElementById('inboxNote').value.trim();
  if(!name){showToast('⚠️ 請輸入名稱');return;}
  const data=loadData();
  data.inbox.push({id:uid(),name,note});
  saveData(data);
  document.getElementById('inboxName').value='';
  document.getElementById('inboxNote').value='';
  renderInbox();showToast('✅ 已加入待排程！');
}
function renderInbox(){
  const data=loadData(),el=document.getElementById('list-inbox');
  if(!data.inbox||data.inbox.length===0){el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0">尚無待排程項目 ✨</div>';return;}
  el.innerHTML='';
  data.inbox.forEach(item=>{
    const div=document.createElement('div');div.className='task-item';
    div.innerHTML=`
      <div class="task-item-icon">📝</div>
      <div class="task-item-body">
        <div class="task-item-text">${escHtml(item.name)}</div>
        ${item.note?`<div class="task-item-sub">${escHtml(item.note)}</div>`:''}
      </div>
      <div class="task-item-actions">
        <button class="task-edit-btn" style="font-size:11px;width:auto;padding:0 8px;border-radius:8px;" onclick="scheduleInbox('${item.id}')">📅排入</button>
        <button class="task-edit-btn" onclick="editInbox('${item.id}')">✎</button>
        <button class="task-del-btn" onclick="deleteInbox('${item.id}')">✕</button>
      </div>
    `;
    el.appendChild(div);
  });
}
function deleteInbox(id){
  const data=loadData();data.inbox=data.inbox.filter(i=>i.id!==id);
  saveData(data);renderInbox();showToast('🗑 已刪除');
}
function editInbox(id){
  const data=loadData(),item=data.inbox.find(i=>i.id===id);if(!item)return;
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><div class="modal-title">✎ 修改待排程</div><input class="modal-input" id="editInput" value="${escHtml(item.name)}" placeholder="名稱"><input class="modal-input" id="editNote" value="${escHtml(item.note||'')}" placeholder="備註（選填）"><div class="modal-btns"><button class="modal-save" onclick="saveInboxEdit('${id}')">儲存</button><button class="modal-cancel" onclick="closeModal()">取消</button></div></div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.body.appendChild(overlay);
  setTimeout(()=>document.getElementById('editInput').focus(),100);
}
function saveInboxEdit(id){
  const name=document.getElementById('editInput').value.trim();
  const note=document.getElementById('editNote')?document.getElementById('editNote').value.trim():'';
  if(!name){showToast('⚠️ 名稱不能為空');return;}
  const data=loadData(),item=data.inbox.find(i=>i.id===id);
  if(item){item.name=name;item.note=note;}
  saveData(data);closeModal();renderInbox();showToast('✅ 已更新！');
}
function scheduleInbox(id){
  const data=loadData(),item=data.inbox.find(i=>i.id===id);if(!item)return;
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal"><div class="modal-title">📅 排入哪一天？</div><div style="font-size:14px;margin-bottom:12px;color:var(--muted)">${escHtml(item.name)}</div><input class="modal-input" type="date" id="scheduleDate" value="${todayKey()}"><div class="modal-btns"><button class="modal-save" onclick="confirmSchedule('${id}')">排入月曆</button><button class="modal-cancel" onclick="closeModal()">取消</button></div></div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.body.appendChild(overlay);
}
function confirmSchedule(id){
  const dateVal=document.getElementById('scheduleDate').value;
  if(!dateVal){showToast('⚠️ 請選擇日期');return;}
  const data=loadData(),item=data.inbox.find(i=>i.id===id);if(!item)return;
  data.tasks.push({id:uid(),name:item.name,type:'once',date:dateVal});
  data.inbox=data.inbox.filter(i=>i.id!==id);
  saveData(data);closeModal();renderInbox();renderCal();
  showToast(`✅ 已排入 ${dateVal}！`);
}

buildMonthDayPicker();
document.getElementById('onceDate').value=todayKey();
initCal();renderManage();

// ── Notes 筆記 ──
let expandedNoteId=null, openCats={};

function renderNotes(){
  const data=loadData(), view=document.getElementById('notesView');
  view.innerHTML='';
  const cats=data.noteCats||[], notes=data.notes||[];

  // 新增大分類輸入列
  const addRow=document.createElement('div');
  addRow.className='notes-new-cat-row';
  const inp=document.createElement('input');
  inp.className='quick-input'; inp.id='newCatInput'; inp.placeholder='新增大分類...';
  inp.onkeydown=function(e){if(e.key==='Enter')addCategory();};
  const btn=document.createElement('button');
  btn.className='quick-add-btn'; btn.textContent='＋'; btn.onclick=addCategory;
  addRow.appendChild(inp); addRow.appendChild(btn);
  view.appendChild(addRow);

  if(cats.length===0){
    const empty=document.createElement('div');
    empty.style.cssText='color:var(--muted);font-size:13px;text-align:center;padding:24px 0';
    empty.textContent='輸入上方新增第一個分類 ✨';
    view.appendChild(empty); return;
  }

  cats.forEach(function(cat){
    const isOpen=!!openCats[cat.id];
    const catNotes=notes.filter(function(n){return n.catId===cat.id;});
    const group=document.createElement('div'); group.className='note-group';

    // 標題列
    const header=document.createElement('div'); header.className='note-group-header';
    const arrow=document.createElement('span'); arrow.className='note-group-arrow'+(isOpen?' open':''); arrow.textContent='▶';
    const title=document.createElement('span'); title.className='note-group-title'; title.textContent=cat.name;
    const count=document.createElement('span'); count.className='note-group-count'; count.textContent=catNotes.length+' 項';
    const acts=document.createElement('div'); acts.className='note-group-actions';
    const editBtn=document.createElement('button'); editBtn.className='task-edit-btn'; editBtn.textContent='✎';
    editBtn.onclick=function(e){e.stopPropagation();editCat(cat.id);};
    const delBtn=document.createElement('button'); delBtn.className='task-del-btn'; delBtn.textContent='✕';
    delBtn.onclick=function(e){e.stopPropagation();deleteCat(cat.id);};
    acts.appendChild(editBtn); acts.appendChild(delBtn);
    header.appendChild(arrow); header.appendChild(title); header.appendChild(count); header.appendChild(acts);
    header.onclick=function(){openCats[cat.id]=!openCats[cat.id];renderNotes();};
    group.appendChild(header);

    // 展開內容
    if(isOpen){
      const body=document.createElement('div'); body.className='note-group-body';
      catNotes.forEach(function(note){
        const isExp=expandedNoteId===note.id;
        const itemWrap=document.createElement('div');

        const item=document.createElement('div'); item.className='note-item';
        const ibody=document.createElement('div'); ibody.className='note-item-body';
        const ititle=document.createElement('div'); ititle.className='note-item-title';
        ititle.textContent=note.title||(note.body||'').slice(0,20);
        ibody.appendChild(ititle);
        if(note.title&&note.body){
          const prev=document.createElement('div'); prev.className='note-item-preview';
          prev.textContent=(note.body||'').slice(0,40)+((note.body||'').length>40?'…':'');
          ibody.appendChild(prev);
        }
        const iacts=document.createElement('div'); iacts.className='note-item-actions';
        const iedit=document.createElement('button'); iedit.className='task-edit-btn'; iedit.textContent='✎';
        iedit.onclick=function(e){e.stopPropagation();openNoteModal(note.id,cat.id);};
        const idel=document.createElement('button'); idel.className='task-del-btn'; idel.textContent='✕';
        idel.onclick=function(e){e.stopPropagation();deleteNote(note.id);};
        iacts.appendChild(iedit); iacts.appendChild(idel);
        item.appendChild(ibody); item.appendChild(iacts);
        item.onclick=function(){expandedNoteId=isExp?null:note.id;renderNotes();};
        itemWrap.appendChild(item);

        if(isExp){
          const expanded=document.createElement('div'); expanded.className='note-item-expanded';
          expanded.textContent=note.body||'';
          itemWrap.appendChild(expanded);
        }
        body.appendChild(itemWrap);
      });

      // 新增項目按鈕
      const addItemBtn=document.createElement('button'); addItemBtn.className='note-add-item-btn';
      addItemBtn.textContent='＋ 新增項目';
      addItemBtn.onclick=function(){openNoteModal(null,cat.id);};
      body.appendChild(addItemBtn);
      group.appendChild(body);
    }
    view.appendChild(group);
  });
}

function addCategory(){
  const input=document.getElementById('newCatInput'), name=input.value.trim();
  if(!name){showToast('⚠️ 請輸入分類名稱');return;}
  const data=loadData();
  if(!data.noteCats)data.noteCats=[];
  const cat={id:uid(),name};
  data.noteCats.push(cat);
  saveData(data); input.value=''; openCats[cat.id]=true; renderNotes(); showToast('✅ 分類已建立！');
}
function editCat(catId){
  const data=loadData(), cat=(data.noteCats||[]).find(function(c){return c.id===catId;});
  if(!cat)return;
  const overlay=document.createElement('div'); overlay.className='modal-overlay';
  const modal=document.createElement('div'); modal.className='modal';
  modal.innerHTML='<div class="modal-title">✎ 修改分類名稱</div><input class="modal-input" id="editInput"><div class="modal-btns"><button class="modal-save" id="saveCatBtn">儲存</button><button class="modal-cancel" id="cancelBtn">取消</button></div>';
  overlay.appendChild(modal);
  overlay.onclick=function(e){if(e.target===overlay)closeModal();};
  document.body.appendChild(overlay);
  document.getElementById('editInput').value=cat.name;
  document.getElementById('saveCatBtn').onclick=function(){
    const name=document.getElementById('editInput').value.trim();
    if(!name){showToast('⚠️ 名稱不能為空');return;}
    const d=loadData(), c=(d.noteCats||[]).find(function(x){return x.id===catId;});
    if(c)c.name=name; saveData(d); closeModal(); renderNotes(); showToast('✅ 已更新！');
  };
  document.getElementById('cancelBtn').onclick=closeModal;
  setTimeout(function(){document.getElementById('editInput').focus();},100);
}
function deleteCat(catId){
  const data=loadData();
  const hasNotes=(data.notes||[]).some(function(n){return n.catId===catId;});
  if(hasNotes&&!confirm('刪除此分類會一併刪除裡面的項目，確定嗎？'))return;
  data.noteCats=(data.noteCats||[]).filter(function(c){return c.id!==catId;});
  data.notes=(data.notes||[]).filter(function(n){return n.catId!==catId;});
  saveData(data); delete openCats[catId]; renderNotes(); showToast('🗑 已刪除');
}
function openNoteModal(noteId,catId){
  const data=loadData();
  const note=noteId?(data.notes||[]).find(function(n){return n.id===noteId;}):null;
  const overlay=document.createElement('div'); overlay.className='modal-overlay';
  const modal=document.createElement('div'); modal.className='modal';
  modal.innerHTML='<div class="modal-title">'+(note?'✎ 編輯項目':'＋ 新增項目')+'</div><input class="modal-input" id="noteTitle" placeholder="標題（例：Gmail）"><textarea class="modal-textarea" id="noteBody" placeholder="帳號、密碼、備註..."></textarea><div class="modal-btns"><button class="modal-save" id="saveNoteBtn">儲存</button><button class="modal-cancel" id="cancelNoteBtn">取消</button></div>';
  overlay.appendChild(modal);
  overlay.onclick=function(e){if(e.target===overlay)closeModal();};
  document.body.appendChild(overlay);
  if(note){document.getElementById('noteTitle').value=note.title||''; document.getElementById('noteBody').value=note.body||'';}
  document.getElementById('saveNoteBtn').onclick=function(){saveNote(noteId,catId);};
  document.getElementById('cancelNoteBtn').onclick=closeModal;
  setTimeout(function(){document.getElementById('noteTitle').focus();},100);
}
function saveNote(noteId,catId){
  const title=document.getElementById('noteTitle').value.trim();
  const body=document.getElementById('noteBody').value.trim();
  if(!title&&!body){showToast('⚠️ 請輸入內容');return;}
  const data=loadData();
  if(!data.notes)data.notes=[];
  if(noteId){
    const note=data.notes.find(function(n){return n.id===noteId;});
    if(note){note.title=title;note.body=body;}
  } else {
    data.notes.push({id:uid(),catId:catId,title:title,body:body});
  }
  saveData(data); closeModal(); renderNotes(); showToast('✅ 已儲存！');
}
function deleteNote(id){
  const data=loadData();
  data.notes=(data.notes||[]).filter(function(n){return n.id!==id;});
  if(expandedNoteId===id)expandedNoteId=null;
  saveData(data); renderNotes(); showToast('🗑 已刪除');
}
</script>
</body>
</html>
